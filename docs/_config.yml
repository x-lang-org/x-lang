title: X 编程语言
description: X Language - A modern programming language with natural-language-style keywords
baseurl: "/x-lang"
url: "https://xiongdi.github.io"

markdown: kramdown
theme: minima
plugins:
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Defaults: apply a layout to all pages that have front matter.
defaults:
  -
    scope:
      path: ""
    values:
      layout: "page"

