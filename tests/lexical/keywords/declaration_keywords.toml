# 声明关键字测试
name = "declaration_keywords"
description = "测试声明关键字: let, mutable, function, class, trait, type"
category = "lexical/keywords"
spec = ["spec/docs/01-lexical.md"]

source = """
let x: integer = 1
mutable y: integer = 2
function add(a: integer, b: integer) -> integer = a + b
class Point { let x: integer, let y: integer }
trait Show { function show() -> string }
type Color = Red | Green | Blue
"""

[expect]
compile = false

[expect.tokens]
contains = ["Let", "Mutable", "Function", "Class", "Trait", "Type"]
