# 注释测试
name = "comments_test"
description = "测试单行注释和多行注释"
category = "lexical/comments"
spec = ["spec/docs/01-lexical.md"]

# SPEC.md 规范: 支持单行注释 // 和多行注释 /* */
source = """
// 单行注释
let x: integer = 42

/* 这是
   多行注释，
   支持嵌套 /* 内部注释 */ */

function greet(name: string) {
    // 注释在函数内
    println(name)
}

greet("World")
println(x)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "World\n42\n"

[expect.tokens]
contains = ["Let", "Function"]
