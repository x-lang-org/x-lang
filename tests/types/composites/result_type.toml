# Result 类型测试
name = "result_type"
description = "测试 Result<T, E> 类型"
category = "types/composites"
spec = ["spec/docs/02-types.md"]

source = """
enum Result {
    Success(integer)
    Failure(string)
}

let ok = Result.Success(100)
let err = Result.Failure("error occurred")

when ok is {
    Result.Success(v) => println(v)
    Result.Failure(e) => println(e)
}

when err is {
    Result.Success(v) => println(v)
    Result.Failure(e) => println(e)
}
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "100\nerror occurred\n"
