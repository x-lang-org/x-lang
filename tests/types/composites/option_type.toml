# Option 类型测试
name = "option_type"
description = "测试 Option<T> 类型"
category = "types/composites"
spec = ["spec/docs/02-types.md"]

source = """
enum Option {
    Some(integer)
    None
}

let present = Option.Some(42)
let absent = Option.None

when present is {
    Option.Some(v) => println(v)
    Option.None => println("none")
}

when absent is {
    Option.Some(v) => println(v)
    Option.None => println("empty")
}
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "42\nempty\n"
