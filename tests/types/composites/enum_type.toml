# 枚举类型测试
name = "enum_type"
description = "测试枚举类型定义和模式匹配"
category = "types/composites"
spec = ["spec/docs/02-types.md", "spec/docs/06-classes.md"]

source = """
enum Color {
    Red
    Green
    Blue
}

enum Optional {
    Some(integer)
    None
}

let c = Color.Red
println(c)

let x = Optional.Some(42)
when x is {
    Optional.Some(v) => println(v)
    Optional.None => println("none")
}

let y = Optional.None
when y is {
    Optional.Some(v) => println(v)
    Optional.None => println("empty")
}
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "Color.Red\n42\nempty\n"
