# 端到端阶乘测试
name = "e2e_factorial"
description = "端到端测试：阶乘计算"
category = "e2e"
spec = ["spec/docs/01-overview.md"]

source = """
function factorial(n: integer) -> integer {
    if n <= 1 { return 1 }
    return n * factorial(n - 1)
}

println(factorial(5))
"""

[expect]
compile = true

[expect.runtime]
output_contains = ["120"]
