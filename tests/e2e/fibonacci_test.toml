# 端到端斐波那契测试
name = "e2e_fibonacci"
description = "端到端测试：斐波那契数列"
category = "e2e"
spec = ["spec/docs/01-overview.md"]

source = """
function fibonacci(n: integer) -> integer {
    if n <= 1 { return n }
    return fibonacci(n - 1) + fibonacci(n - 2)
}

println(fibonacci(10))
"""

[expect]
compile = true

[expect.runtime]
output_contains = ["55"]
