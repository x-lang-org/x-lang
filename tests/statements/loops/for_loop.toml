# For Each 循环测试 (SPEC.md 规范语法)
name = "for_loop"
description = "测试 for each 循环遍历"
category = "statements/loops"
spec = ["spec/docs/04-statements.md"]

# SPEC.md 规范: for each item in collection { ... }
source = """
let mutable sum = 0
for each i in [1, 2, 3, 4, 5] {
    sum = sum + i
}
println(sum)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "15\n"
