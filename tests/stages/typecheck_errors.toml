# 阶段测试 - 类型检查错误
name = "stage_typecheck_errors"
description = "测试类型检查阶段的错误检测"
category = "stages/typecheck"
spec = ["spec/docs/02-types.md"]

source = """
function add(a: integer, b: integer) -> integer {
    return a + b
}

function main() {
    // 类型错误：字符串不能加整数
    let result = add("hello", 42)
    println(result)
}
"""

[expect]
compile = false
error_contains = ["type", "mismatch"]