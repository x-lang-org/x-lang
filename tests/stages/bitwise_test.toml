# 阶段测试 - 算术运算
name = "stage_arithmetic"
description = "测试算术运算的完整流水线"
category = "stages/arithmetic"
spec = ["spec/docs/03-expressions.md"]

source = """
function main() {
    let a = 10
    let b = 3
    let add_result = a + b
    let sub_result = a - b
    let mul_result = a * b
    println(add_result)
    println(sub_result)
    println(mul_result)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证

# 1. 词法分析
[expect.tokens]
contains = ["Ident", "Plus", "Minus"]
not_contains = ["Error"]

# 2. AST
[expect.ast]
nodes = ["FunctionDecl", "Binary", "VariableDecl"]

# 3. 类型检查
[expect.typecheck]

# 4. HIR
[expect.hir]
functions = ["main"]

# 5. 后端（跳过，因为 Python 后端有问题）
# [expect.backend.python]
# source_contains = ["def main"]

# 6. 运行时
[expect.runtime]
output_contains = ["13", "7", "30"]