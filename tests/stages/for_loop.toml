# 阶段测试 - For 循环 over array
name = "stage_for_loop"
description = "测试 For 循环 over array 的完整流水线"
category = "stages/loops"
spec = ["spec/docs/04-statements.md"]

source = """
function main() {
    let numbers = [1, 2, 3, 4, 5]
    let total = 0
    for n in numbers {
        total = total + n
    }
    println(total)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证

# 1. 词法分析
[expect.tokens]
contains = ["For", "Ident"]
not_contains = ["Error"]

# 2. AST
[expect.ast]
nodes = ["FunctionDecl", "For"]
not_nodes = ["Error"]

# 3. 类型检查
[expect.typecheck]

# 4. HIR
[expect.hir]
functions = ["main"]

# 5. 后端
[expect.backend.python]
source_contains = ["def main"]

# 6. 运行时 (1+2+3+4+5 = 15)
[expect.runtime]
output = "15\n"