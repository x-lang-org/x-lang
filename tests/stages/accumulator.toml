# 阶段测试 - 累加器模式
name = "stage_accumulator"
description = "测试累加器模式"
category = "stages/patterns"

source = """
function count_to(n: integer) -> integer {
    let i = 1
    let count = 0
    while i <= n {
        count = count + 1
        i = i + 1
    }
    return count
}

function main() {
    println(count_to(25))
}
"""

[expect]
compile = true
exit_code = 0
[expect.runtime]
output = "25\n"