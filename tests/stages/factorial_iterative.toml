# 阶段测试 - 阶乘（循环版）
name = "stage_factorial_iterative"
description = "测试阶乘循环版本"
category = "stages/algorithms"

source = """
function factorial(n: integer) -> integer {
    let result = 1
    let i = 1
    while i <= n {
        result = result * i
        i = i + 1
    }
    return result
}

function main() {
    println(factorial(6))
}
"""

[expect]
compile = true
exit_code = 0
[expect.runtime]
output = "720\n"