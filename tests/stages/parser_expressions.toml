# 阶段测试 - 语法分析
name = "stage_parser_expressions"
description = "测试 Parser 对各种表达式的解析"
category = "stages/parser"
spec = ["spec/docs/03-expressions.md"]

source = """
function test() -> integer {
    let a = 10
    if a > 5 {
        return 1
    }
    return 0
}

function main() {
    let result = test()
    println(result)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证：tokens → ast → typecheck → hir → mir → lir → backend → runtime

# 1. 词法分析验证
[expect.tokens]
contains = ["Function", "Ident", "Let", "If", "Return"]
not_contains = ["Error"]

# 2. AST 验证
[expect.ast]
nodes = ["FunctionDecl", "VariableDecl", "Binary", "If"]
not_nodes = ["Error"]

# 3. 类型检查验证（通过即成功）
[expect.typecheck]

# 4. HIR 验证
[expect.hir]
functions = ["test", "main"]

# 5. MIR 验证
[expect.mir]
functions = ["test", "main"]

# 6. LIR 验证
[expect.lir]
functions = ["test", "main"]

# 7. 后端验证 (Python)
[expect.backend.python]
source_contains = ["def test", "def main"]
functions = ["test", "main"]

# 8. 执行验证（由于 Python 后端存在 bug，暂时跳过）
# [expect.backend.python.execute]
# output = "1\n"

# 9. 运行时验证
[expect.runtime]
output = "1\n"