# 阶段测试 - Match 表达式（副作用）
name = "stage_match"
description = "测试 match 表达式的完整流水线"
category = "stages/match"
spec = ["spec/docs/03-expressions.md"]

source = """
function main() {
    let n = 2
    match n {
        1 => println("one"),
        2 => println("two"),
        3 => println("three"),
        _ => println("other")
    }
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证

# 1. 词法分析
[expect.tokens]
contains = ["Match", "Ident", "Arrow"]
not_contains = ["Error"]

# 2. AST
[expect.ast]
nodes = ["FunctionDecl", "Match", "Case"]
not_nodes = ["Error"]

# 3. 类型检查
[expect.typecheck]

# 4. HIR
[expect.hir]
functions = ["main"]

# 5. 后端
[expect.backend.python]
source_contains = ["def main"]

# 6. 运行时
[expect.runtime]
output = "two\n"