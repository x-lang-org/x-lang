# 阶段测试 - 算术表达式组合
name = "stage_arithmetic_complex"
description = "测试复杂算术表达式的完整流水线"
category = "stages/arithmetic"
spec = ["spec/docs/03-expressions.md"]

source = """
function main() {
    let a = 10
    let b = 3
    let c = a + b * 2
    println(c)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证

# 1. 词法分析
[expect.tokens]
contains = ["Ident", "Plus"]
not_contains = ["Error"]

# 2. AST
[expect.ast]
nodes = ["FunctionDecl", "Binary"]

# 3. 类型检查
[expect.typecheck]

# 4. HIR
[expect.hir]
functions = ["main"]

# 5. 后端（跳过，因为 Python 后端有问题）
# [expect.backend.python]
# source_contains = ["def main"]

# 6. 运行时
[expect.runtime]
output = "16\n"