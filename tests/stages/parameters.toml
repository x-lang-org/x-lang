# 阶段测试 - 参数传递
name = "stage_parameters"
description = "测试函数参数传递"
category = "stages/functions"
spec = ["spec/docs/05-functions.md"]

source = """
function swap(a: integer, b: integer) -> integer {
    return a - b
}

function main() {
    let result = swap(100, 50)
    println(result)
}
"""

[expect]
compile = true
exit_code = 0

[expect.tokens]
contains = ["Function", "Parameter"]

[expect.ast]
nodes = ["FunctionDecl", "Parameter"]

[expect.typecheck]

[expect.hir]
functions = ["swap", "main"]

[expect.runtime]
output = "50\n"