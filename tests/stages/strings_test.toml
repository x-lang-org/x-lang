# 阶段测试 - 字符串拼接
name = "stage_strings"
description = "测试字符串拼接的完整流水线"
category = "stages/strings"
spec = ["spec/docs/03-expressions.md"]

source = """
function main() {
    let hello = "Hello"
    let world = "World"
    let combined = hello + ", " + world + "!"
    println(combined)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证

# 1. 词法分析
[expect.tokens]
contains = ["String", "Ident", "Plus"]
not_contains = ["Error"]

# 2. AST
[expect.ast]
nodes = ["FunctionDecl", "VariableDecl", "Binary"]
not_nodes = ["Error"]

# 3. 类型检查
[expect.typecheck]

# 4. HIR
[expect.hir]
functions = ["main"]

# 5. 后端
[expect.backend.python]
source_contains = ["def main"]

# 6. 运行时
[expect.runtime]
output_contains = ["Hello, World!"]