# 阶段测试 - 素数判断
name = "stage_prime"
description = "测试素数判断"
category = "stages/algorithms"
spec = ["spec/docs/05-functions.md"]

source = """
function is_prime(n: integer) -> bool {
    if n <= 1 { return false }
    if n == 2 { return true }
    if n % 2 == 0 { return false }
    let i = 3
    while i * i <= n {
        if n % i == 0 { return false }
        i = i + 2
    }
    return true
}

function main() {
    println(is_prime(2))
    println(is_prime(17))
    println(is_prime(18))
}
"""

[expect]
compile = true
exit_code = 0
[expect.runtime]
output = "true\ntrue\nfalse\n"