# 阶段测试 - 条件分支
name = "stage_conditional"
description = "测试条件分支的完整流水线"
category = "stages/control"
spec = ["spec/docs/03-expressions.md"]

source = """
function sign(n: integer) -> integer {
    if n > 0 {
        return 1
    }
    if n < 0 {
        return -1
    }
    return 0
}

function main() {
    let s1 = sign(5)
    let s2 = sign(-3)
    let s3 = sign(0)
    println(s1)
    println(s2)
    println(s3)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证

# 1. 词法分析
[expect.tokens]
contains = ["Function", "If"]
not_contains = ["Error"]

# 2. AST
[expect.ast]
nodes = ["FunctionDecl", "If", "Binary"]

# 3. 类型检查
[expect.typecheck]

# 4. HIR
[expect.hir]
functions = ["sign", "main"]

# 5. 后端
[expect.backend.python]
source_contains = ["def sign", "def main"]

# 6. 运行时 (1, -1, 0)
[expect.runtime]
output = "1\n-1\n0\n"