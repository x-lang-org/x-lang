# 阶段测试 - LIR 指令
name = "stage_lir_instructions"
description = "测试 LIR 阶段的指令生成"
category = "stages/lir"
spec = ["spec/docs/04-statements.md"]

source = """
function factorial(n: integer) -> integer {
    if n <= 1 {
        return 1
    }
    return n * factorial(n - 1)
}

function main() {
    let result = factorial(5)
    println(result)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证：tokens → ast → typecheck → hir → mir → lir → backend → runtime

# 1. 词法分析验证
[expect.tokens]
contains = ["Function", "Ident", "If", "Return"]
not_contains = ["Error"]

# 2. AST 验证
[expect.ast]
nodes = ["FunctionDecl", "Parameter", "If", "Binary", "Call"]
not_nodes = ["Error"]

# 3. 类型检查验证（通过即成功）
[expect.typecheck]

# 4. HIR 验证
[expect.hir]
functions = ["factorial", "main"]

# 5. MIR 验证
[expect.mir]
functions = ["factorial", "main"]

# 6. LIR 验证
[expect.lir]
functions = ["factorial", "main"]

# 7. 后端验证 (Python)
[expect.backend.python]
source_contains = ["def factorial", "def main"]
functions = ["factorial", "main"]

# 8. 执行验证（由于 Python 后端存在 bug，暂时跳过）
# [expect.backend.python.execute]
# output = "120\n"

# 9. 运行时验证
[expect.runtime]
output = "120\n"