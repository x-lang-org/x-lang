# 阶段测试 - 阶乘改进
name = "stage_factorial2"
description = "测试阶乘改进版"
category = "stages/algorithms"

source = """
function factorial(n: integer) -> integer {
    if n <= 1 { return 1 }
    return n * factorial(n - 1)
}

function main() {
    println(factorial(4))
    println(factorial(10))
}
"""

[expect]
compile = true
exit_code = 0
[expect.runtime]
output = "24\n3628800\n"