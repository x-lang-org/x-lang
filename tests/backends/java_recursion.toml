# 后端测试 - Java 递归
name = "backend_java_recursion"
description = "测试 Java 后端递归函数"
category = "backends/java"
spec = ["spec/docs/01-overview.md"]

source = """
function power(base: integer, exp: integer) -> integer {
    if exp == 0 {
        return 1
    }
    return base * power(base, exp - 1)
}

function main() {
    let result = power(2, 10)
    println(result)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证

# 1. 词法分析
[expect.tokens]
contains = ["Function", "Ident", "If", "Return"]
not_contains = ["Error"]

# 2. AST
[expect.ast]
nodes = ["FunctionDecl", "If", "Call", "Binary"]

# 3. 类型检查
[expect.typecheck]

# 4. HIR
[expect.hir]
functions = ["power", "main"]

# 5. MIR
[expect.mir]
functions = ["power", "main"]

# 6. LIR
[expect.lir]
functions = ["power", "main"]

# 7. 后端验证 (Java)
[expect.backend.java]
source_contains = ["public static int power", "public static void main"]
functions = ["power", "main"]

# 8. 运行时验证 (2^10 = 1024)
[expect.runtime]
output = "1024\n"