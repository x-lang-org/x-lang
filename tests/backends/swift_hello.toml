# 后端测试 - Swift
name = "backend_swift_hello"
description = "测试 Swift 后端代码生成"
category = "backends/swift"
spec = ["spec/docs/01-overview.md"]

source = """
function abs(n: integer) -> integer {
    if n < 0 {
        return -n
    }
    return n
}

function main() {
    let result = abs(-42)
    println(result)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证

# 1. 词法分析
[expect.tokens]
contains = ["Function", "Ident", "If", "Return"]
not_contains = ["Error"]

# 2. AST
[expect.ast]
nodes = ["FunctionDecl", "Parameter", "If", "Binary"]

# 3. 类型检查
[expect.typecheck]

# 4. HIR
[expect.hir]
functions = ["abs", "main"]

# 5. MIR
[expect.mir]
functions = ["abs", "main"]

# 6. LIR
[expect.lir]
functions = ["abs", "main"]

# 7. 后端验证 (Swift)
[expect.backend.swift]
source_contains = ["func abs", "func main()"]
functions = ["abs", "main"]

# 8. 运行时验证
[expect.runtime]
output = "42\n"