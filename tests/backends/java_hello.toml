# 后端测试 - Java
name = "backend_java_hello"
description = "测试 Java 后端代码生成"
category = "backends/java"
spec = ["spec/docs/01-overview.md"]

source = """
function add(a: integer, b: integer) -> integer {
    return a + b
}

function main() {
    let sum = add(10, 20)
    println(sum)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证

# 1. 词法分析
[expect.tokens]
contains = ["Function", "Ident", "Return"]
not_contains = ["Error"]

# 2. AST
[expect.ast]
nodes = ["FunctionDecl", "Parameter", "Binary", "Call"]

# 3. 类型检查
[expect.typecheck]

# 4. HIR
[expect.hir]
functions = ["add", "main"]

# 5. MIR
[expect.mir]
functions = ["add", "main"]

# 6. LIR
[expect.lir]
functions = ["add", "main"]

# 7. 后端验证 (Java)
[expect.backend.java]
source_contains = ["public static int add", "public static void main"]
functions = ["add", "main"]

# 8. 运行时验证
[expect.runtime]
output = "30\n"