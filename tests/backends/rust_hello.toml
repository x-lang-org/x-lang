# 后端测试 - Rust
name = "backend_rust_hello"
description = "测试 Rust 后端代码生成"
category = "backends/rust"
spec = ["spec/docs/01-overview.md"]

source = """
function add(a: integer, b: integer) -> integer {
    return a + b
}

function main() {
    let sum = add(100, 200)
    println(sum)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证：tokens → ast → typecheck → hir → mir → lir → backend → runtime

# 1. 词法分析验证
[expect.tokens]
contains = ["Function", "Ident", "Return"]
not_contains = ["Error"]

# 2. AST 验证
[expect.ast]
nodes = ["FunctionDecl", "Parameter", "Binary", "Call"]
not_nodes = ["Error"]

# 3. 类型检查验证（通过即成功）
[expect.typecheck]

# 4. HIR 验证
[expect.hir]
functions = ["add", "main"]

# 5. MIR 验证
[expect.mir]
functions = ["add", "main"]

# 6. LIR 验证
[expect.lir]
functions = ["add", "main"]

# 7. 后端验证 (Rust)
[expect.backend.rust]
source_contains = ["fn add", "fn main"]
functions = ["add", "main"]

# 8. 运行时验证
[expect.runtime]
output = "300\n"