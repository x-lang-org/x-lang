# 后端测试 - Zig 循环
name = "backend_zig_loop"
description = "测试 Zig 后端循环"
category = "backends/zig"
spec = ["spec/docs/01-overview.md"]

source = """
function count_upto(n: integer) -> integer {
    let count = 0
    let i = 0
    while i < n {
        count = count + 1
        i = i + 1
    }
    return count
}

function main() {
    let result = count_upto(50)
    println(result)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证

# 1. 词法分析
[expect.tokens]
contains = ["Function", "While", "Return"]
not_contains = ["Error"]

# 2. AST
[expect.ast]
nodes = ["FunctionDecl", "While", "Assign"]

# 3. 类型检查
[expect.typecheck]

# 4. HIR
[expect.hir]
functions = ["count_upto", "main"]

# 5. MIR
[expect.mir]
functions = ["count_upto", "main"]

# 6. LIR
[expect.lir]
functions = ["count_upto", "main"]

# 7. 后端验证 (Zig)
[expect.backend.zig]
source_contains = ["fn count_upto", "pub fn main"]
functions = ["count_upto", "main"]

# 8. 运行时验证 (count_upto(50) = 50)
[expect.runtime]
output = "50\n"