# 后端测试 - LLVM
name = "backend_llvm_hello"
description = "测试 LLVM 后端代码生成"
category = "backends/llvm"
spec = ["spec/docs/01-overview.md"]

source = """
function square(x: integer) -> integer {
    return x * x
}

function main() {
    let result = square(7)
    println(result)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证

# 1. 词法分析
[expect.tokens]
contains = ["Function", "Ident", "Return"]
not_contains = ["Error"]

# 2. AST
[expect.ast]
nodes = ["FunctionDecl", "Parameter", "Binary", "Call"]

# 3. 类型检查
[expect.typecheck]

# 4. HIR
[expect.hir]
functions = ["square", "main"]

# 5. MIR
[expect.mir]
functions = ["square", "main"]

# 6. LIR
[expect.lir]
functions = ["square", "main"]

# 7. 后端验证 (LLVM)
[expect.backend.llvm]
source_contains = ["define", "square", "main"]
functions = ["square", "main"]

# 8. 运行时验证
[expect.runtime]
output = "49\n"