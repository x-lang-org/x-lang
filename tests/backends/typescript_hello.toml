# 后端测试 - TypeScript
name = "backend_typescript_hello"
description = "测试 TypeScript 后端代码生成"
category = "backends/typescript"
spec = ["spec/docs/01-overview.md"]

source = """
function greet(name: string) -> string {
    return "Hello, " + name
}

function main() {
    let message = greet("TypeScript")
    println(message)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证：tokens → ast → typecheck → hir → mir → lir → backend → runtime

# 1. 词法分析验证
[expect.tokens]
contains = ["Function", "Ident", "String"]
not_contains = ["Error"]

# 2. AST 验证
[expect.ast]
nodes = ["FunctionDecl", "Parameter", "Binary", "Call"]
not_nodes = ["Error"]

# 3. 类型检查验证（通过即成功）
[expect.typecheck]

# 4. HIR 验证
[expect.hir]
functions = ["greet", "main"]

# 5. MIR 验证
[expect.mir]
functions = ["greet", "main"]

# 6. LIR 验证
[expect.lir]
functions = ["greet", "main"]

# 7. 后端验证 (TypeScript)
[expect.backend.ts]
source_contains = ["function greet", "function main"]
functions = ["greet", "main"]

# 8. 运行时验证
[expect.runtime]
output = "Hello, TypeScript\n"