# 后端测试 - TypeScript 递归
name = "backend_typescript_recursion"
description = "测试 TypeScript 后端递归函数"
category = "backends/typescript"
spec = ["spec/docs/01-overview.md"]

source = """
function sum(n: integer) -> integer {
    if n <= 0 {
        return 0
    }
    return n + sum(n - 1)
}

function main() {
    let result = sum(100)
    println(result)
}
"""

[expect]
compile = true
exit_code = 0

# 完整流水线验证

# 1. 词法分析
[expect.tokens]
contains = ["Function", "Ident", "If", "Return"]
not_contains = ["Error"]

# 2. AST
[expect.ast]
nodes = ["FunctionDecl", "If", "Call", "Binary"]

# 3. 类型检查
[expect.typecheck]

# 4. HIR
[expect.hir]
functions = ["sum", "main"]

# 5. MIR
[expect.mir]
functions = ["sum", "main"]

# 6. LIR
[expect.lir]
functions = ["sum", "main"]

# 7. 后端验证 (TypeScript)
[expect.backend.ts]
source_contains = ["function sum", "function main"]
functions = ["sum", "main"]

# 8. 运行时验证 (1+2+...+100 = 5050)
[expect.runtime]
output = "5050\n"