# 类继承测试
name = "class_inheritance"
description = "测试类继承"
category = "oop/inheritance"
spec = ["spec/docs/06-classes.md"]

source = """
class Animal {
    let name: string

    virtual function speak() {
        println(self.name)
    }
}

let a = Animal("Max")
a.speak()
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "Max\n"
