# 访问控制测试
name = "visibility_test"
description = "测试类成员访问控制"
category = "oop/visibility"
spec = ["spec/docs/06-classes.md"]

source = """
class Point {
    public x: integer
    private y: integer

    get_y() -> integer {
        return self.y
    }
}

let p = Point(10, 20)
println(p.x)
println(p.get_y())
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "10\n20\n"
