# Trait 测试
name = "basic_trait"
description = "测试 trait 定义和实现"
category = "oop/traits"
spec = ["spec/docs/06-classes.md"]

source = """
trait Printable {
    to_string() -> string
}

class Point {
    x: integer
    y: integer

    to_string() -> string {
        return "Point"
    }
}

let p = Point(1, 2)
println(p.to_string())
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "Point\n"
