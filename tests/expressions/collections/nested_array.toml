# 嵌套数组测试
name = "nested_array"
description = "测试嵌套数组字面量"
category = "expressions/collections"

source = """
function main() -> integer {
    let matrix = [[1, 2], [3, 4], [5, 6]]
    let first_row = matrix[0]
    println(first_row[0])
    0
}
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "1\n"